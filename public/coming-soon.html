<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">ClearOffer — Coming soon</title>
  <meta name="description" content="AI-powered property intelligence for Brisbane buyers. Coming soon.">
  <link rel="stylesheet" href="/css/main.css">
  <script src="/js/config.js"></script>
  <style>
    .cs-wrap {
      min-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      position: relative;
    }
    .cs-wrap::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 700px; height: 700px;
      background: radial-gradient(ellipse, rgba(201,150,58,0.05) 0%, transparent 65%);
      pointer-events: none;
    }
    .cs-logo {
      font-family: var(--font-serif);
      font-size: 32px;
      font-weight: 600;
      color: var(--gold-light);
      margin-bottom: 40px;
      letter-spacing: -0.5px;
    }
    .cs-wrap h1 {
      font-size: clamp(36px, 7vw, 72px);
      color: var(--text);
      margin-bottom: 16px;
      line-height: 1.1;
    }
    .cs-wrap h1 em { color: var(--gold-pale); font-style: italic; }
    .cs-wrap > p {
      font-size: 18px;
      color: var(--text-sub);
      max-width: 420px;
      margin: 0 auto 40px;
      line-height: 1.6;
    }
    .notify-form {
      display: flex;
      gap: 10px;
      max-width: 400px;
      margin: 0 auto;
      flex-wrap: wrap;
      justify-content: center;
    }
    .notify-input {
      flex: 1;
      min-width: 220px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 15px;
      padding: 13px 16px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.2s;
    }
    .notify-input:focus { border-color: var(--gold-dim); }
    .notify-input::placeholder { color: var(--text-muted); }
    .notify-success {
      font-size: 15px;
      color: #5aaa7a;
      margin-top: 16px;
      display: none;
    }
    .tagline-below {
      margin-top: 60px;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-faint);
    }
  </style>
</head>
<body>

  <div class="cs-wrap">
    <div class="cs-logo" id="cs-logo">ClearOffer</div>

    <h1>Know what to offer<br><em>before you ask.</em></h1>
    <p id="cs-sub">AI-powered property intelligence for Brisbane buyers. The analytical work a buyer's agent does — without the $15,000 fee.</p>

    <div class="notify-form">
      <input
        type="email"
        class="notify-input"
        id="notify-email"
        placeholder="your@email.com"
      >
      <button class="btn btn--primary" id="notify-btn">Notify me</button>
    </div>
    <div class="notify-success" id="notify-success">✓ We'll let you know when we launch.</div>

    <div class="tagline-below" id="cs-tagline-below"></div>
  </div>

  <script>
    const C = window.CLEAROFFER;

    // Wire config-driven strings
    document.title = `${C.PRODUCT.NAME} — Coming soon`;
    document.getElementById('cs-logo').textContent        = C.PRODUCT.NAME;
    document.getElementById('cs-tagline-below').textContent = `${C.PRODUCT.DOMAIN} · ${new Date().getFullYear()}`;

    document.getElementById('notify-btn').addEventListener('click', async () => {
      const email = document.getElementById('notify-email').value.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return;

      const btn = document.getElementById('notify-btn');
      btn.disabled = true;
      btn.textContent = '…';

      try {
        // Store in Supabase as scout_report with placeholder address
        await fetch('/api/submit-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, address: '__waitlist__' }),
        });
      } catch { /* non-fatal */ }

      document.getElementById('notify-success').style.display = 'block';
      btn.style.display = 'none';
    });

    document.getElementById('notify-email').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('notify-btn').click();
    });
  </script>

</body>
</html>
