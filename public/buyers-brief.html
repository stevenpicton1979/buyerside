<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buyer's Brief — ClearOffer</title>
  <link rel="stylesheet" href="/css/main.css">
  <script src="/js/config.js"></script>
  <style>
    /* Brief-specific styles */
    .brief-section {
      margin-bottom: 32px;
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .brief-section:nth-child(2) { animation-delay: 0.05s; }
    .brief-section:nth-child(3) { animation-delay: 0.10s; }
    .brief-section:nth-child(4) { animation-delay: 0.15s; }

    .brief-body {
      font-size: 16px;
      line-height: 1.75;
      color: var(--text-sub);
    }
    .brief-body p { margin-bottom: 14px; }
    .brief-body h2 {
      font-family: var(--font-serif);
      font-size: 22px;
      color: var(--text);
      margin: 32px 0 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-soft);
    }
    .brief-body h3 {
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 24px 0 8px;
    }
    .brief-body strong { color: var(--text); font-weight: 600; }
    .brief-body em { font-style: italic; color: var(--gold-pale); }

    /* Markdown tables */
    .brief-table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0 20px;
      font-size: 14px;
    }
    .brief-table th,
    .brief-table td {
      text-align: left;
      padding: 8px 12px;
      border: 1px solid var(--border);
    }
    .brief-table th {
      background: rgba(201,150,58,0.08);
      color: var(--gold-pale);
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .brief-table tr:nth-child(even) td {
      background: rgba(255,255,255,0.02);
    }
    .brief-body hr {
      border: none;
      border-top: 1px solid var(--border-soft);
      margin: 28px 0;
    }

    /* Streaming cursor */
    .cursor {
      display: inline-block;
      width: 2px; height: 18px;
      background: var(--gold);
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 0.9s step-end infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    /* Offer highlight box */
    .offer-box {
      background: linear-gradient(135deg, #141008 0%, #0d0a04 100%);
      border: 1px solid var(--gold-dim);
      border-radius: var(--radius-lg);
      padding: 28px;
      margin: 20px 0;
      box-shadow: var(--shadow-gold);
    }
    .offer-box__label {
      font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 8px;
    }
    .offer-box__amount {
      font-family: var(--font-serif);
      font-size: clamp(28px, 5vw, 44px);
      color: var(--gold-pale);
      font-weight: 600;
      line-height: 1;
    }
    .offer-box__sub {
      font-size: 14px; color: var(--text-muted); margin-top: 8px;
    }

    /* Progress bar */
    .gen-progress {
      margin-bottom: 32px;
    }
    .gen-progress__bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .gen-progress__fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      border-radius: 2px;
      transition: width 0.4s ease;
      width: 0%;
    }
    .gen-progress__label {
      font-size: 12px; color: var(--text-muted);
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="container--wide nav__inner">
      <a href="/" class="nav__logo" id="nav-logo">ClearOffer <span>Buyer's Brief</span></a>
    </div>
  </nav>

  <!-- ===== VERIFICATION STATE ===== -->
  <div id="verify-state" class="loading-wrap">
    <div class="spinner" style="width: 32px; height: 32px; border-width: 3px;"></div>
    <p>Verifying payment…</p>
  </div>

  <!-- ===== GENERATING STATE ===== -->
  <div id="generating-state" style="display:none; padding: 40px 0 80px;">
    <div class="container">
      <div style="margin-bottom: 28px;">
        <h4>Buyer's Brief</h4>
        <h1 id="gen-address" style="color: var(--text); font-size: clamp(18px, 3vw, 26px); margin-top: 8px; line-height: 1.3;"></h1>
      </div>
      <div class="gen-progress">
        <div class="gen-progress__bar">
          <div class="gen-progress__fill" id="gen-progress-fill"></div>
        </div>
        <div class="gen-progress__label" id="gen-progress-label">Gathering data…</div>
      </div>

      <!-- Streaming content renders here as it arrives -->
      <div class="brief-body" id="streaming-content"></div>
    </div>
  </div>

  <!-- ===== COMPLETE STATE ===== -->
  <div id="complete-state" style="display:none; padding-bottom: 80px;">
    <div class="container">
      <!-- Header -->
      <div style="padding: 40px 0 24px; border-bottom: 1px solid var(--border-soft); margin-bottom: 32px;">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px;">
          <div>
            <h4>Buyer's Brief</h4>
            <h1 id="complete-address" style="color: var(--text); font-size: clamp(18px, 3vw, 26px); margin-top: 8px; line-height: 1.3;"></h1>
            <div style="font-size: 13px; color: var(--text-muted); margin-top: 8px;" id="complete-meta"></div>
          </div>
          <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 16px; text-align: center;">
            <div style="font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px;">Paid report</div>
            <div style="font-size: 14px; font-weight: 600; color: var(--gold);">$149 AUD</div>
          </div>
        </div>
      </div>

      <!-- Full brief content -->
      <div class="brief-body" id="brief-content"></div>

      <!-- Disclaimer -->
      <div class="disclaimer" id="brief-disclaimer"></div>
    </div>
  </div>

  <!-- ===== ERROR STATE ===== -->
  <div id="error-state" style="display:none; padding: 60px 20px; text-align: center;">
    <div class="container">
      <p style="font-size: 40px; margin-bottom: 16px;">⚠️</p>
      <h2 style="color: var(--text); margin-bottom: 12px;">Something went wrong</h2>
      <p id="error-msg" style="margin-bottom: 24px;"></p>
      <a href="/" class="btn btn--outline" style="display: inline-flex; margin-right: 12px;">Start over</a>
      <a id="support-link" href="#" class="btn btn--outline" style="display: inline-flex;">Contact support</a>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p id="footer-copy"></p>
    </div>
  </footer>

  <script>
    const C = window.CLEAROFFER;
    document.title = `Buyer's Brief — ${C.PRODUCT.NAME}`;
    document.getElementById('nav-logo').childNodes[0].textContent = C.PRODUCT.NAME + ' ';
    document.getElementById('brief-disclaimer').textContent = C.COPY.DISCLAIMER;

    // Wire footer and support link from config (rename-safe)
    const supportEmail = C.PRODUCT.SUPPORT_EMAIL;
    document.getElementById('footer-copy').innerHTML =
      `© ${new Date().getFullYear()} ${C.PRODUCT.NAME} · <a href="mailto:${supportEmail}">${supportEmail}</a>`;
    document.getElementById('support-link').href = `mailto:${supportEmail}`;

    const params     = new URLSearchParams(window.location.search);
    const address    = params.get('address') || '';
    const email      = params.get('email') || '';
    const sessionId  = params.get('session_id') || '';

    if (!address || !email) {
      showError('Missing address or email. Please start from the Scout Report.');
    } else {
      initBrief();
    }

    async function initBrief() {
      setAddress(address);
      setState('verify');

      // Small delay then start generating (payment verified server-side)
      await new Promise(r => setTimeout(r, 600));

      setState('generating');
      setProgress(10, 'Analysing planning overlays…');

      await new Promise(r => setTimeout(r, 400));
      setProgress(25, 'Pulling comparable sales…');

      await streamBrief();
    }

    async function streamBrief() {
      const qualifiers = getStoredQualifiers();

      let fullText = '';
      let chunkCount = 0;

      try {
        const resp = await fetch('/api/buyers-brief', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, address, sessionId, qualifiers }),
        });

        if (!resp.ok) {
          const { error } = await resp.json().catch(() => ({}));
          if (resp.status === 403) {
            showError(`Payment not confirmed. If you've just paid, please wait a moment and refresh. Contact ${supportEmail} if this persists.`);
          } else {
            showError(error || `Generation failed. Please contact ${supportEmail}`);
          }
          return;
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        const streamEl = document.getElementById('streaming-content');
        streamEl.innerHTML = '';

        setProgress(40, 'Writing your Buyer\'s Brief…');

        // Throttle DOM renders — max once per 80ms to avoid thrash
        let renderPending = false;
        function scheduleRender() {
          if (renderPending) return;
          renderPending = true;
          setTimeout(() => {
            renderPending = false;
            renderStreaming(streamEl, fullText);
          }, 80);
        }

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (data === '[DONE]') {
              finalise(fullText);
              return;
            }
            try {
              const parsed = JSON.parse(data);
              if (parsed.error) { showError(parsed.error); return; }
              if (parsed.text) {
                fullText += parsed.text;
                chunkCount++;
                // Update progress
                const prog = Math.min(90, 40 + chunkCount * 0.5);
                setProgress(prog, 'Writing your Buyer\'s Brief…');
                // Render markdown-ish content
                renderStreaming(streamEl, fullText);
              }
            } catch { /* ignore */ }
          }
        }

        // Stream ended without DONE signal — finalise anyway
        finalise(fullText);

      } catch (err) {
        showError('Connection lost during generation. Please refresh and try again.');
        console.error('[buyers-brief] stream error:', err);
      }
    }

    function renderStreaming(el, text) {
      // Render with a trailing cursor
      el.innerHTML = markdownToHtml(text) + '<span class="cursor"></span>';
      // Auto-scroll
      const lastChild = el.lastElementChild;
      if (lastChild) lastChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function finalise(text) {
      setProgress(100, 'Complete.');
      // Small pause then switch to complete state
      setTimeout(() => {
        document.getElementById('brief-content').innerHTML = markdownToHtml(text);
        document.getElementById('complete-meta').textContent =
          new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });
        setState('complete');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 400);
    }

    // ---- Minimal markdown renderer ----
    // Handles #/##/### headings, **bold**, *italic*, tables, ---, plain paragraphs
    function markdownToHtml(text) {
      const lines = text.split('\n');
      let html = '';
      let inPara = false;
      let tableLines = [];

      function flushPara() {
        if (inPara) { html += '</p>'; inPara = false; }
      }
      function flushTable() {
        if (!tableLines.length) return;
        // First line = header, second = separator, rest = rows
        const rows = tableLines.filter(l => !/^\s*\|?[-:| ]+\|?\s*$/.test(l));
        html += '<table class="brief-table">';
        rows.forEach((row, i) => {
          const cells = row.replace(/^\||\|$/g, '').split('|').map(c => c.trim());
          const tag = i === 0 ? 'th' : 'td';
          html += '<tr>' + cells.map(c => `<${tag}>${inlineMarkdown(c)}</${tag}>`).join('') + '</tr>';
        });
        html += '</table>';
        tableLines = [];
      }

      for (const raw of lines) {
        const line = raw.trimEnd();

        // Table row
        if (line.startsWith('|') || (line.includes('|') && /^\s*\|?[-:| ]+\|?\s*$/.test(line))) {
          flushPara();
          tableLines.push(line);
          continue;
        } else {
          flushTable();
        }

        if (line.startsWith('# ')) {
          flushPara();
          html += `<h1>${escHtml(line.slice(2))}</h1>`;
        } else if (line.startsWith('## ')) {
          flushPara();
          html += `<h2>${escHtml(line.slice(3))}</h2>`;
        } else if (line.startsWith('### ')) {
          flushPara();
          html += `<h3>${escHtml(line.slice(4))}</h3>`;
        } else if (/^---+$/.test(line)) {
          flushPara();
          html += '<hr>';
        } else if (line === '') {
          flushPara();
        } else {
          if (!inPara) { html += '<p>'; inPara = true; }
          else html += ' ';
          html += inlineMarkdown(line);
        }
      }
      flushPara();
      flushTable();
      return html;
    }

    function inlineMarkdown(text) {
      return escHtml(text)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>');
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ---- State helpers ----
    function setState(s) {
      document.getElementById('verify-state').style.display     = s === 'verify'     ? 'block' : 'none';
      document.getElementById('generating-state').style.display = s === 'generating' ? 'block' : 'none';
      document.getElementById('complete-state').style.display   = s === 'complete'   ? 'block' : 'none';
      document.getElementById('error-state').style.display      = s === 'error'      ? 'block' : 'none';
    }
    function setAddress(addr) {
      document.getElementById('gen-address').textContent      = addr;
      document.getElementById('complete-address').textContent = addr;
    }
    function setProgress(pct, label) {
      document.getElementById('gen-progress-fill').style.width = `${pct}%`;
      document.getElementById('gen-progress-label').textContent = label;
    }
    function showError(msg) {
      document.getElementById('error-msg').textContent = msg;
      setState('error');
    }

    // Retrieve qualifier answers stored from report page
    function getStoredQualifiers() {
      try {
        const raw = sessionStorage.getItem('co_qualifiers');
        return raw ? JSON.parse(raw) : {};
      } catch { return {}; }
    }
  </script>

</body>
</html>
